name: Build and Release Wheel

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install -U pip
          pip install -U build wheel setuptools huggingface_hub

      - name: Download model files
        run: |
          mkdir -p src/bge_large_en_v15_local/model
          python - <<'PY'
          from huggingface_hub import snapshot_download

          snapshot_download(
              repo_id="BAAI/bge-large-en-v1.5",
              local_dir="src/bge_large_en_v15_local/model",
              local_dir_use_symlinks=False,
          )
          PY

          rm -f src/bge_large_en_v15_local/model/pytorch_model.bin
          rm -rf src/bge_large_en_v15_local/model/onnx

          du -sh src/bge_large_en_v15_local/model
          ls -lh src/bge_large_en_v15_local/model

      - name: Build wheel
        run: |
          python -m build --wheel
          ls -lh dist

      - name: Create GitHub release and upload wheel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create v1.0.0 dist/bge_large_en_v15_local-1.0.0-py3-none-any.whl \
            --repo Nellyan4/bge-large-en-v15-local \
            --title "v1.0.0" \
            --notes "Local wheel for BAAI/bge-large-en-v1.5" \
            --latest
